name: Sync Fork

on:
  schedule:
    - cron: '0 */6 * * *'   # jalan otomatis tiap 6 jam
  workflow_dispatch:        # bisa dijalankan manual dari tombol "Run workflow"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: git remote add upstream https://github.com/cmliu/edgetunnel.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream
        run: git merge upstream/main --allow-unrelated-histories || true

      - name: Push changes
        run: git push origin main
